<html lang="ja"><head><meta http-equiv="Content-Type" content="text/html; charset=UTF-8">

<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>星座ラフバトル</title>
<style>
  :root{
    --bg:#070b1f;
    --bg2:#0d1430;
    --ink:#eaf0ff;
    --muted:#8a93b8;
    --gold:#ffd76b;
    --gold-soft:#ffe9a8;
    --line:#9db4ff;
    --accent:#7c9bff;
    --good:#74e0a8;
    --panel:rgba(255,255,255,.04);
    --panel-border:rgba(255,255,255,.08);
  }
  *{box-sizing:border-box;-webkit-tap-highlight-color:transparent;}
  html,body{margin:0;height:100%;}
  body{
    background:
      radial-gradient(1200px 700px at 70% -10%, #1a2350 0%, transparent 60%),
      radial-gradient(900px 600px at 10% 110%, #15193a 0%, transparent 55%),
      var(--bg);
    color:var(--ink);
    font-family:-apple-system,BlinkMacSystemFont,"Hiragino Kaku Gothic ProN","Noto Sans JP",sans-serif;
    overflow-x:hidden;
  }
  .wrap{max-width:520px;margin:0 auto;padding:18px 16px 60px;}

  header{display:flex;align-items:center;justify-content:space-between;margin-bottom:14px;}
  .logo{font-weight:800;letter-spacing:.04em;font-size:18px;display:flex;align-items:center;gap:8px;}
  .logo .spark{color:var(--gold);filter:drop-shadow(0 0 6px rgba(255,215,107,.7));}
  .tag{font-size:11px;color:var(--muted);border:1px solid var(--panel-border);padding:4px 8px;border-radius:999px;}

  .quest{
    background:linear-gradient(180deg,var(--panel),transparent);
    border:1px solid var(--panel-border);
    border-radius:16px;padding:14px 16px;margin-bottom:12px;
    display:flex;align-items:center;justify-content:space-between;gap:12px;
  }
  .quest .label{font-size:11px;color:var(--muted);letter-spacing:.14em;margin-bottom:4px;}
  .quest .theme{font-size:26px;font-weight:800;line-height:1;}
  .quest .theme small{font-size:13px;font-weight:600;color:var(--muted);margin-left:6px;}
  .reroll{background:var(--panel);border:1px solid var(--panel-border);color:var(--ink);
    font-size:12px;padding:8px 12px;border-radius:10px;cursor:pointer;white-space:nowrap;}
  .reroll:active{transform:scale(.96);}

  .stagewrap{position:relative;border-radius:18px;overflow:hidden;border:1px solid var(--panel-border);
    background:
      radial-gradient(600px 300px at 30% 20%, rgba(124,155,255,.10), transparent 70%),
      linear-gradient(180deg,#060a1c,#0a1230);}
  svg{display:block;width:100%;height:auto;touch-action:manipulation;}
  .hint{position:absolute;left:0;right:0;bottom:10px;text-align:center;font-size:11px;color:var(--muted);
    pointer-events:none;transition:opacity .3s;}

  .counters{display:flex;gap:8px;margin:12px 0;}
  .counter{flex:1;background:var(--panel);border:1px solid var(--panel-border);border-radius:12px;
    padding:10px 12px;text-align:center;}
  .counter .n{font-size:22px;font-weight:800;}
  .counter .k{font-size:10px;color:var(--muted);letter-spacing:.1em;margin-top:2px;}

  .actions{display:flex;gap:8px;margin-bottom:8px;}
  button.act{flex:1;border:none;border-radius:12px;padding:13px;font-size:14px;font-weight:700;
    cursor:pointer;transition:transform .08s, filter .2s;}
  button.act:active{transform:scale(.97);}
  .undo{background:var(--panel);border:1px solid var(--panel-border);color:var(--ink);flex:0 0 84px;}
  .clear{background:var(--panel);border:1px solid var(--panel-border);color:var(--muted);flex:0 0 84px;}
  .judge{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2c00;
    box-shadow:0 6px 20px rgba(255,215,107,.25);}
  .judge:disabled{filter:grayscale(.6) opacity(.5);cursor:not-allowed;box-shadow:none;}

  /* 判定結果オーバーレイ */
  .result{position:fixed;inset:0;background:rgba(4,7,20,.72);backdrop-filter:blur(4px);
    display:none;align-items:center;justify-content:center;padding:24px;z-index:30;}
  .result.show{display:flex;animation:fade .25s ease;}
  @keyframes fade{from{opacity:0}to{opacity:1}}
  .card{width:100%;max-width:400px;background:linear-gradient(180deg,#121a3d,#0c1230);
    border:1px solid var(--panel-border);border-radius:20px;padding:22px;text-align:center;
    box-shadow:0 30px 80px rgba(0,0,0,.5);animation:pop .3s cubic-bezier(.2,.9,.3,1.3);}
  @keyframes pop{from{transform:scale(.9);opacity:0}to{transform:scale(1);opacity:1}}
  .card .score{font-size:54px;font-weight:900;line-height:1;
    background:linear-gradient(180deg,#fff,var(--gold));-webkit-background-clip:text;background-clip:text;color:transparent;}
  .card .score small{font-size:18px;color:var(--muted);-webkit-text-fill-color:var(--muted);}
  .card .verdict{font-size:15px;margin:10px 0 4px;font-weight:700;}
  .card .sub{font-size:12px;color:var(--muted);line-height:1.6;}
  .breakdown{display:flex;gap:8px;margin:16px 0;}
  .breakdown div{flex:1;background:var(--panel);border-radius:10px;padding:8px;}
  .breakdown .bn{font-size:18px;font-weight:800;color:var(--gold-soft);}
  .breakdown .bk{font-size:9px;color:var(--muted);letter-spacing:.08em;margin-top:2px;}
  .nick{width:100%;background:#0a1024;border:1px solid var(--panel-border);color:var(--ink);
    border-radius:10px;padding:11px;font-size:14px;margin:6px 0 12px;text-align:center;}
  .nick::placeholder{color:var(--muted);}
  .cardbtns{display:flex;gap:8px;}
  .cardbtns button{flex:1;border:none;border-radius:11px;padding:12px;font-weight:700;font-size:13px;cursor:pointer;}
  .post{background:linear-gradient(180deg,var(--gold-soft),var(--gold));color:#3a2c00;}
  .share{background:#1d9bf0;color:#fff;}
  .again{background:var(--panel);border:1px solid var(--panel-border);color:var(--ink);}

  /* タイムライン */
  .tl{margin-top:26px;}
  .tl h2{font-size:13px;color:var(--muted);letter-spacing:.12em;margin:0 0 10px;font-weight:700;}
  .tlcard{background:var(--panel);border:1px solid var(--panel-border);border-radius:14px;
    padding:10px;display:flex;align-items:center;gap:12px;margin-bottom:8px;animation:fade .3s;}
  .tlcard .mini{width:64px;height:64px;border-radius:10px;flex:0 0 64px;
    background:linear-gradient(180deg,#060a1c,#0a1230);border:1px solid var(--panel-border);}
  .tlcard .meta{flex:1;min-width:0;}
  .tlcard .who{font-weight:700;font-size:14px;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
  .tlcard .what{font-size:11px;color:var(--muted);margin-top:2px;}
  .tlcard .sc{font-size:22px;font-weight:900;color:var(--gold-soft);flex:0 0 auto;}
  .empty{font-size:12px;color:var(--muted);text-align:center;padding:18px;border:1px dashed var(--panel-border);border-radius:12px;}
</style>
</head>
<body>

r="4.5" fill="#cdd7ff" style="cursor:pointer"></circle><circle data-id="19" cx="449" cy="294" r="18" fill="transparent" style="cursor:pointer"></circle><circle class="star" data-id="20" cx="76" cy="369" r="4.5" fill="#cdd7ff" style="cursor:pointer"></circle><circle data-id="20" cx="76" cy="369" r="18" fill="transparent" style="cursor:pointer"></circle><circle class="star" data-id="21" cx="145" cy="377" r="4.5" fill="#cdd7ff" style="cursor:pointer"></circle><circle data-id="21" cx="145" cy="377" r="18" fill="transparent" style="cursor:pointer"></circle></svg>

<!-- 判定結果 -->
<div class="result" id="result">
  <div class="card">
    <div class="score" id="rScore">0<small>点</small></div>

      <div><div class="bn" id="rThemeScore">0</div><div class="bk">おだい一致</div></div>
      <div><div class="bn" id="rEco">0</div><div class="bk">省エネ度</div></div>
    </div>

<script>
/* ===== お題リスト（固定。後でAIに差し替え可） ===== */
const THEMES = ["ウサギ","さかな","いえ","ねこ","かさ","ヨット","ロケット","ハート","つるぎ","ちょうちょ","おばけ","コップ"];

/* ===== 星の配置：毎回ランダムに散らす ===== */
const STAGE_W = 520, STAGE_H = 420, STAR_COUNT = 22;
let stars = [];        // {id,x,y}
let path = [];         // つないだ星idの順番
let svg, hintEl;

function rand(min,max){return Math.random()*(max-min)+min;}

function scatterStars(){
  stars = [];
  // グリッドベースで散らすと重なりにくい
  const cols=5, rows=5, cellW=STAGE_W/cols, cellH=(STAGE_H-40)/rows;
  let id=0;
  for(let r=0;r<rows;r++){
    for(let c=0;c<cols;c++){
      if(id>=STAR_COUNT) break;
      stars.push({
        id:id++,
        x: Math.round(c*cellW + rand(cellW*0.25, cellW*0.75)),
        y: Math.round(20 + r*cellH + rand(cellH*0.25, cellH*0.75))
      });
    }
  }
}

function render(){
  let html = "";
  // 線（pathの隣同士）
  for(let i=1;i<path.length;i++){
    const a=stars[path[i-1]], b=stars[path[i]];
    html += `<line x1="${a.x}" y1="${a.y}" x2="${b.x}" y2="${b.y}"
      stroke="var(--line)" stroke-width="2" stroke-linecap="round" opacity="0.85"/>`;
  }
  // 星
  for(const s of stars){
    const used = path.includes(s.id);
    const isLast = path.length && path[path.length-1]===s.id;
    const r = used? 7 : 4.5;
    const fill = used? "var(--gold)" : "#cdd7ff";
    const glow = used? 'filter="url(#glow)"' : '';
    html += `<circle class="star" data-id="${s.id}" cx="${s.x}" cy="${s.y}" r="${r}"
      fill="${fill}" ${glow} style="cursor:pointer"/>`;
    // タップ判定を広げる透明な円
    html += `<circle data-id="${s.id}" cx="${s.x}" cy="${s.y}" r="18" fill="transparent" style="cursor:pointer"/>`;
    if(isLast){
      html += `<circle cx="${s.x}" cy="${s.y}" r="12" fill="none" stroke="var(--gold-soft)" stroke-width="1.5" opacity="0.7"/>`;
    }
  }
  const defs = `<defs><filter id="glow" x="-50%" y="-50%" width="200%" height="200%">
    <feGaussianBlur stdDeviation="3" result="b"/><feMerge>
    <feMergeNode in="b"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>`;
  svg.innerHTML = defs + html;

  document.getElementById("cStars").textContent = path.length;
  document.getElementById("cLines").textContent = Math.max(0,path.length-1);
  document.getElementById("judge").disabled = path.length < 2;
  hintEl.style.opacity = path.length? 0 : 1;
}

function onStarTap(id){
  // 直前と同じ星は無視（誤連打防止）
  if(path.length && path[path.length-1]===id) return;
  path.push(id);
  render();
}

/* ===== 判定ロジック（簡易版・後でGemini APIに差し替え） =====
   いまは「線がつながっていて、ほどよい複雑さか」で擬似採点する。
   本番では SVGを画像化して「お題に見えるか」をAIに判定させる差し替えポイント。 */
function judge(){
  const usedStars = path.length;
  const lines = path.length-1;

  // --- おだい一致スコア（今はダミー：形の複雑さから推定）---
  // 線が少なすぎ→伝わらない、多すぎ→ごちゃつく、という山型で評価
  let themeScore;
  if(lines<=1) themeScore = 30 + Math.random()*15;
  else if(lines<=6) themeScore = 60 + Math.random()*35;
  else themeScore = 55 + Math.random()*25;
  themeScore = Math.min(98, Math.round(themeScore));

  // --- 省エネ度（少ない星ほど高い）---
  // 3〜7本くらいで表現できると高評価
  let eco;
  if(usedStars<=3) eco = 70 + Math.random()*15;
  else if(usedStars<=7) eco = 85 + Math.random()*13;
  else eco = Math.max(30, 95 - (usedStars-7)*8);
  eco = Math.min(99, Math.round(eco));

  // 総合（おだい重視7:省エネ3）
  const total = Math.round(themeScore*0.7 + eco*0.3);

  return {total, themeScore, eco, usedStars, lines};
}

const VERDICTS = [
  [90, "✦ 天文台級！", "もはや本物の星座。今夜空に登録された。"],
  [75, "★ なかなかの一座", "言われてみればそう見える。いい線いってる。"],
  [55, "☆ ぎりわかる", "目を細めればそう見えなくもない…？"],
  [0,  "・ 謎の天体", "これは新種だ。学会に報告しよう。"]
];
function verdictFor(score){
  return VERDICTS.find(v=>score>=v[0]);
}

/* ===== タイムライン ===== */
let timeline = []; // {nick, theme, score, path:[{x,y}], lines}

function pushTimeline(entry){
  timeline.unshift(entry);
  renderTimeline();
}
function miniSvg(pathPts){
  // 64x64に正規化して小さな星座を描く
  if(pathPts.length<2) return "";
  const xs=pathPts.map(p=>p.x), ys=pathPts.map(p=>p.y);
  const minX=Math.min(...xs),maxX=Math.max(...xs),minY=Math.min(...ys),maxY=Math.max(...ys);
  const w=Math.max(1,maxX-minX), h=Math.max(1,maxY-minY), pad=10;
  const sc=Math.min((64-pad*2)/w,(64-pad*2)/h);
  const tx=x=>pad+(x-minX)*sc+(64-pad*2-w*sc)/2;
  const ty=y=>pad+(y-minY)*sc+(64-pad*2-h*sc)/2;
  let s=`<svg viewBox="0 0 64 64" width="64" height="64">`;
  for(let i=1;i<pathPts.length;i++){
    s+=`<line x1="${tx(pathPts[i-1].x)}" y1="${ty(pathPts[i-1].y)}" x2="${tx(pathPts[i].x)}" y2="${ty(pathPts[i].y)}" stroke="#9db4ff" stroke-width="1.5"/>`;
  }
  for(const p of pathPts){ s+=`<circle cx="${tx(p.x)}" cy="${ty(p.y)}" r="2.2" fill="#ffd76b"/>`; }
  return s+`</svg>`;
}
function renderTimeline(){
  const el=document.getElementById("timeline");
  if(!timeline.length){el.innerHTML='<div class="empty">まだ誰も投稿していません。最初の一座になろう。</div>';return;}
  el.innerHTML = timeline.map(t=>`
    <div class="tlcard">
      <div class="mini">${miniSvg(t.path)}</div>
      <div class="meta">
        <div class="who">${escapeHtml(t.nick||"名もなき星詠み")}</div>
        <div class="what">おだい「${escapeHtml(t.theme)}」・星${t.path.length}個</div>
      </div>
      <div class="sc">${t.score}</div>
    </div>`).join("");
}
function escapeHtml(s){return String(s).replace(/[&<>"']/g,c=>({'&':'&amp;','<':'&lt;','>':'&gt;','"':'&quot;',"'":'&#39;'}[c]));}

/* ===== お題 ===== */
let currentTheme = THEMES[0];
function setTheme(t){
  currentTheme=t;
  document.getElementById("theme").firstChild.textContent=t;
}
function rerollTheme(){
  let t; do{ t=THEMES[Math.floor(Math.random()*THEMES.length)]; }while(t===currentTheme);
  setTheme(t);
  newRound(true);
}

/* ===== ラウンド管理 ===== */
function newRound(keepTheme){
  path=[];
  scatterStars();
  render();
}

/* ===== 判定結果表示 ===== */
let lastResult=null;
function showResult(){
  const r=judge(); lastResult=r;
  const v=verdictFor(r.total);
  document.getElementById("rScore").innerHTML = r.total+'<small>点</small>';
  document.getElementById("rVerdict").textContent = v[1];
  document.getElementById("rSub").textContent = v[2];
  document.getElementById("rThemeScore").textContent = r.themeScore;
  document.getElementById("rEco").textContent = r.eco;
  document.getElementById("result").classList.add("show");
}
function closeResult(){document.getElementById("result").classList.remove("show");}

/* ===== 起動 ===== */
window.addEventListener("DOMContentLoaded",()=>{
  svg=document.getElementById("stage");
  hintEl=document.getElementById("hint");
  setTheme(THEMES[Math.floor(Math.random()*THEMES.length)]);
  newRound();

  // 星タップ（イベント委譲）
  svg.addEventListener("click",e=>{
    const t=e.target.closest("[data-id]");
    if(!t) return;
    onStarTap(Number(t.getAttribute("data-id")));
  });

  document.getElementById("undo").onclick=()=>{path.pop();render();};
  document.getElementById("clear").onclick=()=>{path=[];render();};
  document.getElementById("judge").onclick=showResult;
  document.getElementById("reroll").onclick=rerollTheme;
  document.getElementById("again").onclick=closeResult;

  document.getElementById("post").onclick=()=>{
    if(!lastResult) return;
    pushTimeline({
      nick:document.getElementById("nick").value.trim(),
      theme:currentTheme,
      score:lastResult.total,
      path: path.map(id=>({x:stars[id].x,y:stars[id].y}))
    });
    document.getElementById("nick").value="";
    closeResult();
    newRound();
    window.scrollTo({top:document.body.scrollHeight,behavior:"smooth"});
  };

  document.getElementById("share").onclick=()=>{
    if(!lastResult) return;
    const text=`星座ラフバトルで「${currentTheme}」を星${lastResult.usedStars}個で描いて${lastResult.total}点！✦ #星座ラフバトル`;
    const url=`https://twitter.com/intent/tweet?text=${encodeURIComponent(text)}`;
    window.open(url,"_blank");
  };
});
</script>
